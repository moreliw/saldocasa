name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: build & push (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            context: ./apps/api
          - app: web
            context: ./apps/web
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/saldocasa-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/saldocasa-${{ matrix.app }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://saldocasa.morelidev.com/api

  deploy:
    name: deploy to prod
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "infra/docker-compose.prod.yml"
          target: "/opt/saldocasa/"
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,JWT_SECRET,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/saldocasa
            mv -f docker-compose.prod.yml docker-compose.yml
            cat > .env <<EOF
            IMAGE_TAG=${IMAGE_TAG}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            JWT_SECRET=${JWT_SECRET}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            EOF
            chmod 600 .env
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "--- aguardando API ficar pronta ---"
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3011/api/health >/dev/null 2>&1; then
                echo "api OK em ${i}s"; break
              fi
              if [ "$i" = "30" ]; then
                echo "ERRO: api não respondeu em 30s"; docker compose logs api --tail=40; exit 1
              fi
              sleep 1
            done
            echo "--- aguardando WEB ficar pronta ---"
            for i in $(seq 1 30); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3010/login || echo 000)
              if [ "$code" = "200" ]; then echo "web OK em ${i}s"; break; fi
              if [ "$i" = "30" ]; then
                echo "ERRO: web não respondeu em 30s (last code=$code)"; docker compose logs web --tail=40; exit 1
              fi
              sleep 1
            done
            echo "--- smoke ---"
            curl -fsS http://127.0.0.1:3011/api/health; echo
            curl -s -o /dev/null -w "web /: HTTP %{http_code}\n" http://127.0.0.1:3010/
            curl -s -o /dev/null -w "web /login: HTTP %{http_code}\n" http://127.0.0.1:3010/login
