name: saldocasa

services:
  postgres:
    image: postgres:16-alpine
    container_name: saldocasa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - saldocasa_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [saldocasa]

  api:
    image: ghcr.io/moreliw/saldocasa-api:${IMAGE_TAG:-latest}
    container_name: saldocasa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3011
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APP_PUBLIC_URL: https://saldocasa.morelidev.com
    ports:
      - "127.0.0.1:3011:3011"
    networks: [saldocasa]

  web:
    image: ghcr.io/moreliw/saldocasa-web:${IMAGE_TAG:-latest}
    container_name: saldocasa-web
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      PORT: 3010
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: https://saldocasa.morelidev.com/api
      INTERNAL_API_URL: http://api:3011/api
    ports:
      - "127.0.0.1:3010:3010"
    networks: [saldocasa]

volumes:
  saldocasa_pgdata:

networks:
  saldocasa:
    name: saldocasa
