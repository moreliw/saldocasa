# /etc/nginx/sites-available/saldocasa.morelidev.com
# Instalar com:
#   ln -sf /etc/nginx/sites-available/saldocasa.morelidev.com /etc/nginx/sites-enabled/
#   certbot certonly --nginx -d saldocasa.morelidev.com  (se ainda não tiver cert)
#   nginx -t && systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name saldocasa.morelidev.com;

    ssl_certificate     /etc/letsencrypt/live/saldocasa.morelidev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saldocasa.morelidev.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    # api (NestJS) — montada em /api por setGlobalPrefix
    location /api/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # web (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name saldocasa.morelidev.com;
    return 301 https://$host$request_uri;
}
